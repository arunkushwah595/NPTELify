services:
  - type: web
    name: nptelify-backend
    runtime: java
    plan: free
    buildCommand: cd backend && mvn clean package -DskipTests
    startCommand: cd backend && java -Dserver.port=$PORT -jar target/nptelify-0.0.1-SNAPSHOT.jar
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: nptelify-postgres
          property: connectionString
      - key: JAVA_TOOL_OPTIONS
        value: -Xmx512m
      - key: JWT_SECRET
        scope: run
      - key: CORS_ORIGIN
        scope: run
        value: https://your-frontend-domain.vercel.app

  - type: pserv
    name: nptelify-postgres
    runtime: postgres15
    plan: free
    ipAllowList: []
